services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-job_scheduler}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-job_scheduler}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      LOG_LEVEL: ${LOG_LEVEL:-info}

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-job_scheduler}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HEARTBEAT_INTERVAL_MS: ${HEARTBEAT_INTERVAL_MS:-10000}
      REAPER_INTERVAL_MS: ${REAPER_INTERVAL_MS:-15000}
      REAPER_STALE_THRESHOLD_MS: ${REAPER_STALE_THRESHOLD_MS:-30000}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-1000}
      DRAIN_TIMEOUT_MS: ${DRAIN_TIMEOUT_MS:-25000}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    depends_on:
      - api
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}

volumes:
  pgdata:
